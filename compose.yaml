services:
  darknight:
    build: .
    container_name: darknight
    environment:
      TZ: Asia/Seoul
      REPORT_HOUR: "8"
      REPORT_MINUTE: "0"
      ROUND_REPORT_HOUR: "14"
      ROUND_REPORT_MINUTE: "0"
      ROUND_REPORT_WEEKDAYS: "mon,wed,fri"
      RUN_ON_START: "false"
      INPUT_CSV: data/results.csv
      GM_ID: G101
      UPCOMING_URL: https://www.betman.co.kr/main/mainPage/gamebuy/gameSlip.do?frameType=typeA&gmId=G101
      OUTPUT_DIR: reports
      ANALYSIS_DIR: analysis
      CACHE_DIR: .cache
      RECENT_GAMES: "5"
      SEARCH_WINDOW: "12"
      BACKTEST_TEST_RATIO: "0.2"
      SIMULATION_LOOKBACK_DAYS: "30"
      SIMULATION_EDGE_THRESHOLD: "0.05"
      SIMULATION_STAKE: "1.0"
      SYNC_PROBE_COUNT: "6"
      SYNC_STOP_AFTER_MISS: "2"
      POLL_MINUTES: "10"
      SCHEDULER_LOCK_MAX_AGE_MINUTES: "180"
      SCHEDULER_STAGE_TIMEOUT_SECONDS: "3600"
      USE_BROWSER: "true"
      HEADED: "false"
    volumes:
      - ./data:/app/data
      - ./.cache:/app/.cache
      - ./analysis:/app/analysis
      - ./reports:/app/reports
  darknight-web:
    build: .
    container_name: darknight-web
    command: ["streamlit", "run", "streamlit_app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    environment:
      TZ: Asia/Seoul
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./.cache:/app/.cache
      - ./analysis:/app/analysis
      - ./reports:/app/reports
